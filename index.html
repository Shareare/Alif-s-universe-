<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alif Smart Order System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }
        
        .main-container {
            max-width: 480px;
            width: 100%;
        }

        /* --- SLIDER SECTION --- */
        .slider {
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            background: #fff;
        }
        .slides {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slides img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* --- INFINITE DELIVERY SCROLL --- */
        .delivery-wrapper {
            overflow: hidden;
            background: var(--card-bg);
            padding: 15px 0;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            position: relative;
        }
        .delivery-track {
            display: flex;
            align-items: center;
            gap: 50px;
            width: max-content;
            animation: infiniteScroll 15s linear infinite;
        }
        .partner-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }
        .delivery-track img {
            height: 35px;
            border-radius: 6px;
        }
        
        @keyframes infiniteScroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- FORM & CARD --- */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            background: #f9fafb;
            transition: 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .flex-row { display: flex; gap: 10px; }

        /* --- INVOICE --- */
        #invoice {
            margin: 20px 0;
            padding: 15px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
        }
        .inv-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .total-row {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #cbd5e1;
            font-weight: 600;
            color: var(--text-main);
            font-size: 18px;
        }

        /* --- BUTTONS --- */
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: var(--primary-hover); }
        .btn-location {
            background: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }

        /* --- TOAST --- */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            text-align: center;
        }
        #toast.show { top: 25px; }
        #progress {
            height: 4px;
            width: 0%;
            background: rgba(255,255,255,0.7);
            margin-top: 8px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="main-container">

    <div class="slider">
        <div class="slides" id="slides">
            <img src="https://picsum.photos/id/1015/800/300">
            <img src="https://picsum.photos/id/1016/800/300">
            <img src="https://picsum.photos/id/1018/800/300">
        </div>
    </div>

    <div class="delivery-wrapper">
        <div class="delivery-track">
            <div class="partner-item">🚚 OUR DELIVERY PARTNERS:</div>
            <img src="https://i.ibb.co.com/rKDZHqRK/Screenshot.jpg">
            <img src="https://i.ibb.co.com/v4ZsHdmK/Screenshot.jpg">
            
            <div class="partner-item">🚚 OUR DELIVERY PARTNERS:</div>
            <img src="https://i.ibb.co.com/rKDZHqRK/Screenshot.jpg">
            <img src="https://i.ibb.co.com/v4ZsHdmK/Screenshot.jpg">
        </div>
    </div>

    <div class="card">
        <form id="orderForm">
            <div class="flex-row">
                <div class="form-group" style="flex: 2;">
                    <label>Product Code</label>
                    <input id="code" placeholder="e.g. B10" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Quantity</label>
                    <input id="qty" type="number" value="1" min="1">
                </div>
            </div>

            <div class="form-group">
                <label>Your Name</label>
                <input id="name" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input id="phone" placeholder="017XXXXXXXX" required>
            </div>

            <div class="form-group">
                <label>Full Address</label>
                <textarea id="address" placeholder="Area, Road, House number..." required></textarea>
            </div>

            <div class="form-group">
                <button type="button" class="btn-location" onclick="getLoc()">📍 Share My Location</button>
                <input id="map" placeholder="Location Link" readonly>
            </div>

            <div id="invoice">
                <div class="inv-row">
                    <span>Product Price:</span>
                    <span>৳ <span id="priceDisplay">0</span></span>
                </div>
                <div class="inv-row">
                    <span>Delivery Charge:</span>
                    <span>৳ 120</span>
                </div>
                <div class="inv-row total-row">
                    <span>Total Bill:</span>
                    <span>৳ <span id="totalDisplay">120</span></span>
                </div>
            </div>

            <button type="submit">Confirm Order</button>
        </form>
    </div>

</div>

<div id="toast">
    <span id="msg"></span>
    <div id="progress"></div>
</div>

<script>
    /* SLIDER LOGIC */
    let slideIdx = 0;
    setInterval(() => {
        slideIdx = (slideIdx + 1) % 3;
        document.getElementById("slides").style.transform = `translateX(-${slideIdx * 100}%)`;
    }, 3000);

    /* PRICING CALCULATION */
    function getVal(char) {
        if(/[a-z]/i.test(char)) return char.toUpperCase().charCodeAt(0) - 64;
        if(/[0-9]/.test(char)) return parseInt(char);
        return 0;
    }

    function updatePrice() {
        const code = document.getElementById("code").value;
        const qty = parseInt(document.getElementById("qty").value) || 1;
        
        let unitPrice = 0;
        for(let char of code) {
            unitPrice += getVal(char) * 10;
        }

        const subTotal = unitPrice * qty;
        const finalTotal = subTotal + 120;

        document.getElementById("priceDisplay").innerText = subTotal;
        document.getElementById("totalDisplay").innerText = code ? finalTotal : 120;
    }

    document.getElementById("code").oninput = updatePrice;
    document.getElementById("qty").oninput = updatePrice;

    /* LOCATION LOGIC */
    function getLoc() {
        const mapBox = document.getElementById("map");
        mapBox.value = "Locating...";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                mapBox.value = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            }, () => {
                mapBox.value = "Access Denied";
            });
        }
    }

    /* TOAST LOGIC */
    function showToast(message) {
        const t = document.getElementById("toast");
        const p = document.getElementById("progress");
        document.getElementById("msg").innerText = message;

        t.classList.add("show");
        p.style.transition = "none";
        p.style.width = "0%";

        setTimeout(() => {
            p.style.transition = "width 3s linear";
            p.style.width = "100%";
        }, 50);

        setTimeout(() => t.classList.remove("show"), 3000);
    }

    /* FORM SUBMISSION */
    document.getElementById("orderForm").onsubmit = (e) => {
        e.preventDefault();
        showToast("আপনার অর্ডারটি গ্রহণ করা হয়েছে। শীঘ্রই যোগাযোগ করা হবে।");
        e.target.reset();
        document.getElementById("priceDisplay").innerText = "0";
        document.getElementById("totalDisplay").innerText = "120";
    }
</script>

</body>
</html>
