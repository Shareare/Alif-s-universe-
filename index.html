<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Nova AI — তোমার বুদ্ধিমান সঙ্গী</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #05050f;
    --surface: #0d0d20;
    --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07);
    --accent: #7c6af7;
    --accent2: #f06cf9;
    --accent3: #3de8c8;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --user-bubble: linear-gradient(135deg, #7c6af7 0%, #f06cf9 100%);
    --ai-bubble: rgba(255,255,255,0.05);
    --glow: 0 0 40px rgba(124,106,247,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hind Siliguri', 'Sora', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Animated Background ── */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: float 12s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: #7c6af7; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: #f06cf9; bottom: 100px; right: -80px; animation-delay: -4s; }
  .orb3 { width: 250px; height: 250px; background: #3de8c8; top: 40%; left: 50%; animation-delay: -8s; }

  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-30px) scale(1.05); }
    66% { transform: translate(-20px,20px) scale(0.95); }
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Header ── */
  .header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    background: rgba(5,5,15,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo-ring {
    position: relative;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }
  .logo-ring svg {
    width: 100%;
    height: 100%;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logo-inner {
    position: absolute;
    inset: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .header-info h1 {
    font-family: 'Sora', sans-serif;
    font-size: 17px;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .header-info p {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #3de8c8;
    font-family: 'Sora', sans-serif;
  }
  .dot {
    width: 7px; height: 7px;
    background: #3de8c8;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 0 0 rgba(61,232,200,0.5); }
    50% { opacity:0.7; transform:scale(1.2); box-shadow: 0 0 0 5px rgba(61,232,200,0); }
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 5;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; opacity: 0.5; }

  /* Welcome Screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60%;
    gap: 16px;
    animation: fadeUp 0.8s ease both;
    text-align: center;
    padding: 20px;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .welcome-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #7c6af7, #f06cf9);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 60px rgba(124,106,247,0.5);
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%,100% { box-shadow: 0 0 40px rgba(124,106,247,0.4); }
    50% { box-shadow: 0 0 80px rgba(240,108,249,0.6); }
  }

  .welcome h2 {
    font-family: 'Sora', sans-serif;
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome p { color: var(--muted); font-size: 14px; max-width: 320px; line-height: 1.7; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .chip {
    padding: 8px 16px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--text);
    backdrop-filter: blur(10px);
  }
  .chip:hover {
    background: rgba(124,106,247,0.15);
    border-color: rgba(124,106,247,0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124,106,247,0.2);
  }

  /* ── Message Bubbles ── */
  .message {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    animation: msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    max-width: 85%;
  }
  @keyframes msgIn {
    from { opacity:0; transform:scale(0.85) translateY(10px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai   { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .message.user .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 15px rgba(124,106,247,0.4);
  }
  .message.ai .avatar {
    background: linear-gradient(135deg, #1a1a35, #2a2a50);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 100%;
    word-break: break-word;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 5px;
    box-shadow: 0 8px 30px rgba(124,106,247,0.35);
    color: #fff;
    font-weight: 400;
  }
  .message.ai .bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    backdrop-filter: blur(10px);
    color: var(--text);
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { background: var(--accent2); animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { background: var(--accent3); animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ── Input Area ── */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px 20px;
    background: rgba(5,5,15,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px 12px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrapper:focus-within {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.1), var(--glow);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Hind Siliguri', sans-serif;
    resize: none;
    max-height: 120px;
    line-height: 1.6;
    padding: 2px 0;
  }
  #userInput::placeholder { color: var(--muted); }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 15px rgba(124,106,247,0.4);
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 25px rgba(124,106,247,0.6); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 10px;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.3px;
  }

  /* Code blocks in AI response */
  .bubble code {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.2);
    padding: 2px 6px;
    border-radius: 5px;
    font-size: 12px;
    font-family: monospace;
  }
  .bubble pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.6;
  }

  /* Shimmer on new messages */
  .message.ai .bubble {
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Header -->
<header class="header">
  <div class="logo-ring">
    <svg viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-dasharray="6 4"/>
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c6af7"/>
          <stop offset="100%" stop-color="#f06cf9"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="logo-inner">✦</div>
  </div>
  <div class="header-info">
    <h1>Nova AI</h1>
    <p>Powered by Google Gemini</p>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    সক্রিয়
  </div>
</header>

<!-- Messages -->
<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>নমস্কার! আমি Nova</h2>
    <p>তোমার বুদ্ধিমান AI সঙ্গী। যেকোনো প্রশ্ন করো, যেকোনো বিষয়ে কথা বলো — আমি সবসময় এখানে আছি।</p>
    <div class="suggestions">
      <div class="chip" onclick="sendSuggestion('বাংলাদেশের ইতিহাস সম্পর্কে বলো')">🇧🇩 বাংলাদেশের ইতিহাস</div>
      <div class="chip" onclick="sendSuggestion('একটি মজার কবিতা লিখে দাও')">✍️ কবিতা লেখো</div>
      <div class="chip" onclick="sendSuggestion('আজকের দিনে কী করা উচিত?')">💡 পরামর্শ দাও</div>
      <div class="chip" onclick="sendSuggestion('Python কোড শেখাও')">🖥️ কোড শিখি</div>
    </div>
  </div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" rows="1" placeholder="Nova কে কিছু জিজ্ঞেস করো..." maxlength="4000"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">Nova AI · Google Gemini দ্বারা চালিত · ভুল হতে পারে, যাচাই করে নিন</div>
</div>

<script>
const API_KEY = 'AIzaSyD4Md3ky8oA0SY3Tair68zjen-P-qvpMys';
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

const messagesEl = document.getElementById('messages');
const userInput  = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
let isLoading    = false;
let chatHistory  = [];

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendSuggestion(text) {
  userInput.value = text;
  sendMessage();
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) { w.style.display = 'none'; }
}

function addMessage(role, html) {
  hideWelcome();
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar">${isUser ? '👤' : '✦'}</div>
    <div class="bubble">${html}</div>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar">✦</div>
    <div class="bubble">
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function formatText(text) {
  // Code blocks
  text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escHtml(code.trim())}</code></pre>`
  );
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Newlines
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  addMessage('user', escHtml(text));

  chatHistory.push({ role: 'user', parts: [{ text }] });

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: {
          parts: [{ text: "তুমি Nova, একটি বন্ধুত্বপূর্ণ ও বুদ্ধিমান AI সহকারী। তুমি বাংলায় সাবলীলভাবে কথা বলো। উত্তর সহজ, আকর্ষণীয় এবং সহায়ক রাখো। ইমোজি মাঝেমধ্যে ব্যবহার করো। সব ধরনের প্রশ্নে সাহায্য করো।" }]
        },
        contents: chatHistory,
        generationConfig: { temperature: 0.9, maxOutputTokens: 2048 }
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'দুঃখিত, কোনো উত্তর পাইনি।';

    chatHistory.push({ role: 'model', parts: [{ text: reply }] });

    removeTyping();
    addMessage('ai', formatText(reply));

  } catch (err) {
    removeTyping();
    addMessage('ai', `⚠️ <strong>সংযোগে সমস্যা হয়েছে:</strong><br>${escHtml(err.message)}`);
    chatHistory.pop();
  }

  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
