<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Semi-Transparent Wavy Card with Google Border</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* ডিফল্ট ব্যাকগ্রাউন্ড কালার */
            background-color: #1877F2; 
            /* নতুন যোগ করা ব্যাকগ্রাউন্ড অ্যানিমেশন (মোট ১০ সেকেন্ড, অর্থাৎ প্রতিটি কালার চেঞ্জ হতে আড়াই সেকেন্ড লাগবে) */
            animation: smoothBg 10s ease-in-out infinite;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* ব্যাকগ্রাউন্ড কালার পরিবর্তনের অ্যানিমেশন */
        @keyframes smoothBg {
            0% { background-color: #1877F2; }   /* Blue */
            25% { background-color: #9C27B0; }  /* Purple */
            50% { background-color: #FF5252; }  /* Soft Red/Pink */
            75% { background-color: #00BFA5; }  /* Teal/Green */
            100% { background-color: #1877F2; } /* Back to Blue for smooth loop */
        }

        /* মূল কন্টেইনার যা পালস অ্যানিমেশন করবে */
        .card-container {
            position: relative;
            animation: pulse-animation 4s ease-in-out infinite; /* কার্ড বড়-ছোট হবে */
            padding: 5px; /* ঘুরন্ত বর্ডারের জন্য জায়গা */
            border-radius: 25px;
            overflow: hidden;
        }

        /* গুগল কালারস ঘুরন্ত বর্ডার */
        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* নীল, লাল, হলুদ, সবুজ */
            background: conic-gradient(
                #4285F4 0deg, 
                #EA4335 90deg, 
                #FBBC05 180deg, 
                #34A853 270deg, 
                #4285F4 360deg
            );
            animation: rotate-border 4s linear infinite; /* লাইটিং ঘুরবে */
            z-index: 0;
        }

        /* কার্ডের মূল অংশ যা সেমি-ট্রান্সপারেন্ট এবং ঢেউ থাকবে */
        .info-box {
            position: relative;
            width: 350px;
            padding: 40px 30px;
            /* ১. কার্ডটিকে সেমি-ট্রান্সপারেন্ট করা হয়েছে */
            background: rgba(255, 255, 255, 0.7); /* সাদা কালার, ৭০% ট্রান্সপারেন্ট */
            border-radius: 20px;
            text-align: center;
            z-index: 1; /* বর্ডারের উপরে থাকবে */
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1); /* ভেতরের শ্যাডো */
            overflow: hidden; /* ঢেউ কার্ডের বাইরে যাবে না */
        }

        /* ২. ঢেউ খেলানো প্রভাব (Waves) - ৩টি লেয়ার */
        .wave-layers {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* কন্টেন্টের পিছনে থাকবে */
        }

        .wave-layer {
            position: absolute;
            left: -50%;
            bottom: -150%;
            width: 200%;
            height: 200%;
            border-radius: 50%; /* বড় বৃত্তাকার শেপ ঢেউ তৈরি করবে */
            animation: wave-motion linear infinite; /* ঢেউ ঘুরবে */
        }

        /* আলাদা আলাদা ঢেউয়ের বৈশিষ্ট্য */
        .wave-layer.w1 {
            background: rgba(255, 255, 255, 0.5); /* সাদা ঢেউ, ৫০% ট্রান্সপারেন্ট */
            animation-duration: 4s; /* একটু দ্রুত */
            animation-delay: -1s;
        }

        .wave-layer.w2 {
            background: rgba(255, 255, 255, 0.3); /* সাদা ঢেউ, ৩০% ট্রান্সপারেন্ট */
            animation-duration: 5s; /* মাঝারি গতি */
            animation-delay: -2s;
        }

        .wave-layer.w3 {
            background: rgba(255, 255, 255, 0.2); /* সাদা ঢেউ, ২০% ট্রান্সপারেন্ট */
            animation-duration: 6s; /* ধীর গতি */
            animation-delay: -3s;
        }

        /* ঢেউ ঘোরার এনিমেশন */
        @keyframes wave-motion {
            100% {
                transform: rotate(360deg);
            }
        }

        /* কন্টেন্ট (লোগো এবং টেক্সট) - ঢেউয়ের উপরে থাকার জন্য */
        .content-area {
            position: relative;
            z-index: 2; /* ঢেউয়ের উপরে থাকবে */
        }

        /* ফেসবুক লোগো স্টাইল */
        .fb-logo {
            width: 55px;
            height: 55px;
            margin-bottom: 25px;
        }

        /* টেক্সট স্টাইল এবং ফন্ট সাইজ */
        .info-box p {
            margin: 12px 0;
            font-size: 20px; /* মেইন ফন্ট সাইজ */
            font-weight: bold;
            line-height: 1.5;
        }

        /* ইংরেজি ফন্ট সাইজ আরও ছোট */
        .eng-text {
            font-size: 14px;
            font-weight: normal;
            display: block; /* নতুন লাইনে দেখাবে */
            margin-top: 3px;
        }

        /* একেক লাইনে একেক ডিপ কালার (আগের মতোই) */
        .line-1 { color: #C2185B; } /* Deep Pink */
        .line-2 { color: #1B5E20; } /* Deep Green */
        .line-3 { color: #E65100; } /* Deep Orange */
        .line-4 { color: #4A148C; } /* Deep Purple */
        .line-5 { color: #006064; } /* Deep Cyan */
        .line-6 { color: #1A237E; } /* Deep Indigo */

        /* বর্ডার ঘোরার এনিমেশন */
        @keyframes rotate-border {
            100% {
                transform: rotate(360deg);
            }
        }

        /* পুরো কার্ড বড় এবং ছোট হওয়ার পালস অ্যানিমেশন */
        @keyframes pulse-animation {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06); /* হালকা বড় হবে */
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="info-box">
            <div class="wave-layers">
                <div class="wave-layer w1"></div>
                <div class="wave-layer w2"></div>
                <div class="wave-layer w3"></div>
            </div>

            <div class="content-area">
                <svg class="fb-logo" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                
                <p class="eng-text" style="font-size: 10px; font-weight: normal; color: #555; margin-bottom: 15px;"><b>
                    Assalamu Alaikum! Follow my page for interesting insights and brand-new video content. Stay tuned!    </b>
                </p>
                
            </div>
        </div>
    </div>

</body>
</html>
